name: Build and Release

# Build the .deb on every version tag (e.g. v0.1.0) and attach it to a
# GitHub Release. Also build on PRs/pushes to catch breakage early (without
# publishing).
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]     # add arm64 here later if you want (see notes)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libpcsclite-dev \
            devscripts debhelper dpkg-dev

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb dist/
          ls -l dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: dist/*.deb

  release:
    # Only publish a release when a version tag was pushed.
    needs: build-deb
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download built .deb
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact dirs
        run: |
          find dist -name '*.deb' -exec mv {} dist/ \;
          ls -l dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
